# ==============================================================================
# GitHub Actions - Deploy Backend to EC2
# ==============================================================================
# This workflow deploys the Strapi backend to an AWS EC2 instance using PM2
# 
# Required GitHub Secrets:
#   - EC2_HOST: EC2 instance public IP or domain
#   - EC2_USER: SSH username (usually 'ubuntu')
#   - EC2_SSH_KEY: Private SSH key for EC2 access
#   - ENV_FILE: Base64 encoded .env file contents
# ==============================================================================

name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '20'
  DEPLOY_PATH: /var/www/godatify

jobs:
  # ============================================================================
  # Build and Test
  # ============================================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build Strapi
        working-directory: backend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            backend/dist
            backend/build
          retention-days: 1

  # ============================================================================
  # Deploy to EC2 with PM2
  # ============================================================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.godatify.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: backend

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          # Create deployment script
          cat << 'DEPLOY_SCRIPT' > deploy.sh
          #!/bin/bash
          set -e
          
          cd ${{ env.DEPLOY_PATH }}
          
          # Pull latest code
          git fetch origin main
          git reset --hard origin/main
          
          # Install dependencies
          cd backend
          npm ci --only=production
          
          # Write environment file
          echo "$ENV_CONTENT" | base64 -d > .env
          
          # Build Strapi
          NODE_ENV=production npm run build
          
          # Restart with PM2 (use ecosystem config if available)
          if [ -f "ecosystem.config.js" ]; then
            pm2 reload ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production
          else
            pm2 restart strapi || pm2 start npm --name "strapi" -- run start
          fi
          pm2 save
          
          echo "✅ Deployment completed successfully"
          DEPLOY_SCRIPT
          
          chmod +x deploy.sh
          
          # Copy and execute deployment script
          scp -i ~/.ssh/deploy_key deploy.sh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/deploy.sh
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "ENV_CONTENT='${{ secrets.ENV_FILE }}' bash /tmp/deploy.sh"

      - name: Health Check
        run: |
          sleep 30
          response=$(curl -s -o /dev/null -w "%{http_code}" https://api.godatify.com/_health || echo "000")
          if [ "$response" = "200" ] || [ "$response" = "204" ]; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed with status: $response"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed! Check the logs above for details."

  # ============================================================================
  # Rollback (Manual Trigger)
  # ============================================================================
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && failure()
    
    steps:
      - name: Rollback to previous version
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd ${{ env.DEPLOY_PATH }}
            git checkout HEAD~1
            cd backend
            npm ci --only=production
            NODE_ENV=production npm run build
            pm2 reload ecosystem.config.js --env production || pm2 restart strapi
            pm2 save
          EOF
