# ==============================================================================
# Docker Compose - Local Development & Testing
# ==============================================================================
# Usage:
#   Development:  docker compose up -d
#   Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   Logs:         docker compose logs -f backend
#   Stop:         docker compose down
#   Reset:        docker compose down -v (removes volumes)
# ==============================================================================

services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: godatify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-strapi}
      POSTGRES_USER: ${DATABASE_USERNAME:-strapi}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-strapi_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-strapi} -d ${DATABASE_NAME:-strapi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - godatify-network

  # ============================================================================
  # Strapi Backend
  # ============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: godatify-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Server
      HOST: 0.0.0.0
      PORT: 1337
      
      # Database
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-strapi}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-strapi}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-strapi_password}
      DATABASE_SSL: "false"
      
      # Strapi secrets (use strong values in production)
      APP_KEYS: ${APP_KEYS:-key1,key2,key3,key4}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-api-token-salt}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-admin-jwt-secret}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-transfer-token-salt}
      JWT_SECRET: ${JWT_SECRET:-jwt-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-encryption-key}
      
      # AWS S3 (optional - for media uploads)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_ACCESS_SECRET: ${AWS_ACCESS_SECRET:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_BUCKET: ${AWS_BUCKET:-}
      
      # Node
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - backend_uploads:/app/public/uploads
    ports:
      - "1337:1337"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1337/_health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - godatify-network

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local

# ==============================================================================
# Networks
# ==============================================================================
networks:
  godatify-network:
    driver: bridge
