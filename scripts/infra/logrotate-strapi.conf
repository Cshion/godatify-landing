# ==============================================================================
# Logrotate Configuration for Strapi — godatify-landing
# ==============================================================================
# Manages log rotation for Strapi application logs
#
# Installation:
#   sudo cp logrotate-strapi.conf /etc/logrotate.d/strapi
#   sudo chmod 644 /etc/logrotate.d/strapi
#
# Test configuration:
#   sudo logrotate -d /etc/logrotate.d/strapi  # Dry run
#   sudo logrotate -f /etc/logrotate.d/strapi  # Force rotation
#
# Verify:
#   ls -la /var/log/strapi/
#   cat /var/lib/logrotate/status | grep strapi
# ==============================================================================

/var/log/strapi/*.log {
    # Rotate daily
    daily
    
    # Don't error if log file is missing
    missingok
    
    # Keep 7 days of logs
    rotate 7
    
    # Compress old logs
    compress
    
    # Don't compress the most recent rotated file
    # (allows for viewing without decompression)
    delaycompress
    
    # Don't rotate if log is empty
    notifempty
    
    # Create new log file with these permissions
    create 640 strapi strapi
    
    # Run these commands after rotation
    postrotate
        # Tell PM2 to reopen log files after rotation
        # This ensures PM2 writes to the new log file, not the rotated one
        /usr/bin/pm2 reloadLogs > /dev/null 2>&1 || true
    endscript
    
    # Share rotation scripts between all logs matching the pattern
    sharedscripts
    
    # Use date extension for rotated files (e.g., out.log-20260509)
    dateext
    dateformat -%Y%m%d
    
    # Maximum age before deletion (extra safety)
    maxage 30
}
