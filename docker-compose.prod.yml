# ==============================================================================
# Docker Compose - Production Overrides
# ==============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ==============================================================================

services:
  postgres:
    # In production, consider using AWS RDS instead
    # This config is for self-hosted PostgreSQL on EC2
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}  # Must be set from secure .env
    volumes:
      - /var/lib/godatify/postgres:/var/lib/postgresql/data
    # Don't expose port externally in production
    ports: []

  backend:
    environment:
      NODE_ENV: production
      DATABASE_SSL: "false"  # Set to true if using RDS with SSL
    volumes:
      - /var/lib/godatify/uploads:/app/public/uploads
    # Use host networking for better performance (optional)
    # network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
